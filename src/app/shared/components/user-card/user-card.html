<div class="flex items-center gap-3 p-2 rounded-lg cursor-pointer hover:bg-gray-50 transition-colors" (click)="onClick()">
  <img [src]="user.avatar || 'https://i.pravatar.cc/100'" class="w-10 h-10 rounded-full">
  <div>
    <p class="font-semibold text-sm">{{ user.fullName }}</p>
    <p class="text-xs text-gray-500">{{ user.universityName || 'University' }}</p>
  </div>
</div>
